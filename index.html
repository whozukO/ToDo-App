<!doctype html>
<html lang="en" data-theme>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo App</title>
    <script src="/src/main.js" type="module"></script>
  </head>
  <body>
    <button
      class="toggle-theme-button"
      type="button"
      title="Toggle theme"
      aria-label="Toggle theme"
      data-js-toggle-theme-button
    >
      <span class="toggle-theme-button__moon-icon">
        <svg
          width="40"
          height="40"
          viewBox="0 0 40 40"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M37.9738 20.9456C37.7864 24.4179 36.5972 27.7616 34.55 30.5724C32.5028 33.3833 29.6852 35.541 26.4379 36.7847C23.1905 38.0284 19.6525 38.3049 16.2514 37.5807C12.8503 36.8565 9.73174 35.1627 7.27276 32.704C4.81377 30.2452 3.11961 27.1269 2.39507 23.7258C1.67053 20.3248 1.94662 16.7867 3.18999 13.5393C4.43335 10.2918 6.59075 7.47401 9.40138 5.42651C12.212 3.379 15.5556 2.18945 19.0278 2.00164C19.8378 1.95764 20.2618 2.92164 19.8318 3.60764C18.3936 5.90874 17.7778 8.62938 18.0848 11.3255C18.3919 14.0217 19.6037 16.5342 21.5225 18.453C23.4413 20.3718 25.9538 21.5836 28.6499 21.8906C31.3461 22.1977 34.0667 21.5819 36.3678 20.1436C37.0558 19.7136 38.0178 20.1356 37.9738 20.9456Z"
            stroke="black"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span class="toggle-theme-button__sun-icon">
        <svg
          width="48"
          height="48"
          viewBox="0 0 48 48"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M24 32C28.4183 32 32 28.4183 32 24C32 19.5817 28.4183 16 24 16C19.5817 16 16 19.5817 16 24C16 28.4183 19.5817 32 24 32Z"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M24 4V8"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M24 40V44"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M9.86011 9.85999L12.6801 12.68"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M35.3201 35.3201L38.1401 38.1401"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 24H8"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M40 24H44"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M12.6801 35.3201L9.86011 38.1401"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M38.1401 9.85999L35.3201 12.68"
            stroke="white"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
    </button>
    <div class="todo container" data-js-todo>
      <h1 class="todo__title">My Tasks</h1>
      <form class="todo__form" data-js-todo-new-task-form>
        <div class="todo__field field">
          <label for="new-task" class="field__label visually-hidden">New task</label>
          <input
            class="field__input"
            id="new-task"
            placeholder="Type your task here.."
            autocomplete="off"
            data-js-todo-new-task-input
          />
          <button class="button" type="submit">+ Add</button>
        </div>
      </form>
      <div class="todo__toolbar" data-js-todo-toolbar>
        <div class="todo__filters filters" data-js-todo-filters>
          <button class="filters__button is-active" type="button" data-js-todo-filters-button>
            All
          </button>
          <button class="filters__button" type="button" data-js-todo-filters-button>Active</button>
          <button class="filters__button" type="button" data-js-todo-filters-button>
            Completed
          </button>
        </div>
        <div class="todo__remaining-tasks" data-js-todo-remaining-task>
          <span>2</span> tasks left
        </div>
      </div>
      <ul class="todo__tasks-list" data-js-todo-tasks-list>
        <li class="todo__tasks-list-item task-item" data-js-task-item>
          <div class="task-item__content">
            <label class="visually-hidden" for="todo-ID-checkbox">Mark task as completed</label>
            <input
              class="task-item__checkbox"
              type="checkbox"
              id="todo-ID-checkbox"
              data-js-task-item-checkbox
            />
            <input
              class="task-item__title is-completed"
              type="text"
              value="Todo text"
              aria-label="Task"
              readonly
              data-js-task-item-text
            />
          </div>
          <div class="task-item__actions" data-js-task-item-actions>
            <button
              class="task-item__actions-button"
              type="button"
              aria-label="Edit task"
              data-js-task-item-actions-edit-button
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M21.1739 6.81201C21.7026 6.28344 21.9997 5.56648 21.9998 4.81887C21.9999 4.07125 21.703 3.35422 21.1744 2.82551C20.6459 2.29681 19.9289 1.99973 19.1813 1.99963C18.4337 1.99954 17.7166 2.29644 17.1879 2.82501L3.84193 16.174C3.60975 16.4055 3.43805 16.6905 3.34193 17.004L2.02093 21.356C1.99509 21.4425 1.99314 21.5344 2.01529 21.6219C2.03743 21.7094 2.08285 21.7892 2.14673 21.853C2.21061 21.9168 2.29055 21.9621 2.37809 21.9841C2.46563 22.0061 2.55749 22.004 2.64393 21.978L6.99693 20.658C7.3101 20.5628 7.59511 20.3921 7.82693 20.161L21.1739 6.81201Z"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M15 5L19 9"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <button
              class="task-item__actions-button"
              type="button"
              aria-label="Delete task"
              data-js-task-item-actions-delete-button
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M19 6V20C19 20.5304 18.7893 21.0391 18.4142 21.4142C18.0391 21.7893 17.5304 22 17 22H7C6.46957 22 5.96086 21.7893 5.58579 21.4142C5.21071 21.0391 5 20.5304 5 20V6"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M3 6H21"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M8 6V4C8 3.46957 8.21071 2.96086 8.58579 2.58579C8.96086 2.21071 9.46957 2 10 2H14C14.5304 2 15.0391 2.21071 15.4142 2.58579C15.7893 2.96086 16 3.46957 16 4V6"
                  stroke="black"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </li>
      </ul>
    </div>
  </body>
</html>
